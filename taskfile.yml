version: "3"

tasks:
  docker-clean:
    cmds:
      - docker image prune --all --force
      - docker system prune --all --force

  docker-debug:
    cmds:
      - docker exec -it home-lab-control-plane bash

  cluster-create:
    cmds:
      - kind create cluster --config single-node-extra-port-mapping.yaml --name home-lab
    dir: code

  cluster-status:
    cmds:
      - kind get clusters
      - kubectl get nodes -o wide
    dir: code

  cluster-delete:
    cmds:
      - kind delete cluster --name home-lab
    dir: code

  cluster-ingress-setup:
    cmds:
      - kubectl label node home-lab-control-plane ingress-ready=true
      - kubectl apply -f ingress-nginx.yaml
      - openssl req -x509 -sha256 -nodes -days 365 -newkey rsa:2048 -keyout tls.key -out tls.crt -subj "/CN=nginxsvc/O=nginxsvc"
      - kubectl -n ingress-nginx create secret tls tls-secret --key tls.key --cert tls.crt || true
      - "kubectl wait --namespace ingress-nginx \
        --for=condition=ready pod \
        --selector=app.kubernetes.io/component=controller \
        --timeout=90s"
      - kubectl -n ingress-nginx get services
    dir: code

  dashboard-setup:
    cmds:
      - helm repo add kubernetes-dashboard https://kubernetes.github.io/dashboard/
      - helm upgrade --install kubernetes-dashboard kubernetes-dashboard/kubernetes-dashboard --create-namespace --namespace kubernetes-dashboard
      - kubectl apply -f admin-user.yaml
      - kubectl -n kubernetes-dashboard create token admin-user
      - "kubectl wait --namespace kubernetes-dashboard \
        --for=condition=ready pod \
        --selector=app=kubernetes-dashboard-kong \
        --timeout=90s"
      - kubectl -n kubernetes-dashboard port-forward svc/kubernetes-dashboard-kong-proxy 8443:443
    dir: code

  dashboard-access:
    cmds:
      - kubectl -n kubernetes-dashboard create token admin-user
      - open https://localhost:8443
    dir: code

  cloud-provider-setup:
    cmds:
      - VERSION="$(basename $(curl -s -L -o /dev/null -w '%{url_effective}' https://github.com/kubernetes-sigs/cloud-provider-kind/releases/latest))" && docker run -d --name cloud-provider-kind --rm --network host -v /var/run/docker.sock:/var/run/docker.sock registry.k8s.io/cloud-provider-kind/cloud-controller-manager:${VERSION}
    dir: code

  cloud-provider-check:
    cmds:
      - docker ps --filter name=cloud-provider-kind
      # - docker logs cloud-provider-kind
    dir: code

  cloud-provider-delete:
    cmds:
      - docker stop cloud-provider-kind || true
      - docker rm cloud-provider-kind || true
      - docker stop kind-gateway-proxy-kind || true
      - docker rm kind-gateway-proxy-kind || true
      - docker stop kind-gateway-proxy-istio || true
      - docker rm kind-gateway-proxy-istio || true
      - docker stop kind-gateway-proxy || true
      - docker rm kind-gateway-proxy || true
    dir: code

  kind-gateway-setup:
    cmds:
      - kubectl apply -f gateway-infra-kind.yaml
    dir: code

  kind-gateway-check:
    cmds:
      - kubectl get gateway -n gateway-infra-kind gateway
    dir: code

  istio-setup:
    cmds:
      - helm repo add istio https://istio-release.storage.googleapis.com/charts
      - helm repo update
      - helm install istio-base istio/base -n istio-system --set defaultRevision=default --create-namespace
      - helm install istiod istio/istiod -n istio-system --wait
    dir: code

  istio-check:
    cmds:
      - helm ls -n istio-system
      - helm status istiod -n istio-system
      - kubectl get deployments -n istio-system --output wide
    dir: code

  istio-gateway-setup:
    cmds:
      - kubectl apply -f gateway-infra-istio.yaml
    dir: code

  app-podinfo-create:
    cmds:
      - kubectl apply -f app-podinfo.yaml
    dir: code

  app-podinfo-port-forward:
    cmds:
      - kubectl port-forward svc/podinfo 9898:9898
    dir: code

  app-podinfo-delete:
    cmds:
      - kubectl delete -f app-podinfo.yaml
    dir: code

  app-podinfo-check:
    cmds:
      - "curl -kiv https://podinfo.example.com"
      - "curl -H 'Host: podinfo.example.com' localhost"

  app-echo-kind-create:
    cmds:
      - kubectl apply -f app-echo-kind.yaml
    dir: code

  app-echo-kind-port-forward:
    cmds:
      - kubectl port-forward svc/echo 3000:3000 -n demo
    dir: code

  app-echo-kind-check:
    cmds:
      - "docker rm -f kind-gateway-proxy-kind || true"
      - "GATEWAY_IP=$(kubectl get gateway -n gateway-infra-kind gateway -o jsonpath='{.status.addresses[0].value}') &&
          docker run -d --name kind-gateway-proxy-kind \
          --network kind \
          -p 8080:80 \
          alpine/socat \
          TCP-LISTEN:80,fork TCP:${GATEWAY_IP}:80"
      - "curl -H 'Host: echo.example.gateway.kind.com' http://localhost:8080"
    dir: code

  app-echo-kind-debug:
    cmds:
      - kubectl get gateway -n gateway-infra-kind gateway -o yaml
      - kubectl get httproute -n demo echo -o yaml
      - docker logs -f cloud-provider-kind
    dir: code

  app-echo-istio-create:
    cmds:
      - kubectl apply -f app-echo-istio.yaml
    dir: code

  app-echo-istio-check:
    cmds:
      - "docker rm -f kind-gateway-proxy-istio || true"
      - "GATEWAY_IP=$(kubectl get svc gateway-istio -n gateway-infra-istio -o jsonpath='{.status.loadBalancer.ingress[0].ip}') &&
          docker run -d --name kind-gateway-proxy-istio \
          --network kind \
          -p 8081:80 \
          alpine/socat \
          TCP-LISTEN:80,fork TCP:${GATEWAY_IP}:80"
      - "curl -H 'Host: echo.example.gateway.istio.com' http://localhost:8081"
    dir: code

  k9s:
    cmds:
      - k9s
